<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Gabby ❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
        }

        /* Generic Card Styling */
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
        }
        h1 {
            color: #ff4a6b;
            font-size: 2rem;
            margin: 10px 0;
        }
        p#daily-compliment {
            color: #4a4a4a;
            font-size: 1.4rem;
            font-weight: 600;
            margin: 10px 0 0 0;
        }
        .heart {
            color: #ff4a6b;
            font-size: 2.2rem;
            display: inline-block;
            animation: beat .4s infinite alternate ease-in-out;
        }
        @keyframes beat {
            to { transform: scale(1.15); }
        }

        /* Question & Trivia Cards */
        .question-card {
            background: #ffffff;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            display: none; /* Controlled by JS */
        }
        .question-card h2 {
            margin: 0 0 10px 0;
            color: #ff4a6b;
            font-size: 1.4rem;
        }
        .card-prompt {
            color: #4a4a4a;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Multiple Choice Buttons */
        .option-btn {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffe3e3;
            border-radius: 12px;
            background: #fff5f5;
            color: #333;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }
        
        /* Text Input Styling for Open-Ended Questions */
        .open-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ffe3e3;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
        }
        .open-input:focus {
            border-color: #ff4a6b;
        }
        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #ff4a6b;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }
        .submit-btn:active {
            background: #e03e5c;
        }

        .feedback-text {
            margin-top: 15px;
            margin-bottom: 0;
            font-weight: 700;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>

    <!-- 1. Compliment Section -->
    <div class="card">
        <div class="heart">❤️</div>
        <h1>Danny loves your...</h1>
        <p id="daily-compliment">Loading...</p>
    </div>

    <!-- 2. Days Together Section -->
    <div class="card">
        <h2>We've Been Together For ❤️</h2>
        <h1 id="days-count" style="color: #ff4a6b; font-size: 2.5rem; margin: 10px 0;">0</h1>
        <p>and counting!</p>
    </div>

    <!-- 3. Question of the Day Section (Open Ended) -->
    <div id="qotd-card" class="question-card">
        <h2>Question of the Day 🧠</h2>
        <p id="qotd-prompt" class="card-prompt">Loading question...</p>
        <div id="qotd-container"></div>
        <p id="qotd-feedback" class="feedback-text"></p>
    </div>

    <!-- 4. Daily Trivia Section (Multiple Choice) -->
    <div id="trivia-card" class="question-card">
        <h2>Daily Trivia 🧠</h2>
        <p id="trivia-prompt" class="card-prompt">Loading trivia...</p>
        <div id="trivia-container" class="options-group"></div>
        <p id="trivia-feedback" class="feedback-text"></p>
    </div>

    <script>
        // -------------------------------------------------------------
        // 1. COMPLIMENTS LIST
        // -------------------------------------------------------------
        const compliments = [
            "Beautiful Blue Eyes",
            "Gorgeous Smile",
            "Contagious Laugh",
            "Kind Heart",
            "Sense of Humor",
            "Nightly FaceTime Calls",
            "Ability to Make Me a Better Man",
            "Amazing Style",
            "Desire to Help Me Study",
            "Goofy Moments",
            "Fun Date Ideas",
            "Compliments",
            "Sexual Teasing",
            "Determination",
            "Positive Energy",
            "Perfect Body",
            "Warm Hugs",
            "Way of Showing Love",
            "Athleticism",
            "Jewelry",
            "Hair",
            "Positive Energy",
            "Smarts",
            "Kindness",
            "Competitiveness",
            "Desire to Have Fun",
            "Kisses",
            "Extremely Thoughtful Gifts",
            "Hilarious Jokes",
            "Back Scratches",
            "Freckles",
            "Work Ethic",
            "Mirror Pics",
            "Mom Skills",
            "Brownies",
            "Ability to Care",
            "Neck Kisses",
            "Listening Skills",
            "Head Scratches",
            "TikTok's",
            "Willingness to do Anything for Me",
            "Surprises"
        ];

        function getDailyCompliment() {
            const startComplimentNumber = 1; 

            const baseDate = new Date(2026, 6, 19); 
            const now = new Date();
            
            baseDate.setHours(0, 0, 0, 0);
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            const diffTime = today - baseDate;
            const daysPassed = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            const startingIndex = startComplimentNumber - 1;
            const index = (startingIndex + daysPassed) % compliments.length;
            
            const safeIndex = (index + compliments.length) % compliments.length;

            return compliments[safeIndex];
        }

        // -------------------------------------------------------------
        // 2. SCHEDULE MAPS
        // -------------------------------------------------------------
        
        // Open-ended questions -> Question of the Day
        const qotdSchedule = {
            "2026-07-24": {
                question: "What's one thing that you like about me/something that I do that you've NEVER told me?",
                responseMsg: ""
            },
            "2026-07-25": {
                question: "What is your dream date for tonight? Get as detailed as possible. (No Guarantees)",
                responseMsg: ""
            }
        };

        // Multiple choice questions -> Daily Trivia
        const triviaSchedule = {
            "2026-08-11": {
                question: "How many full months have we been dating",
                options: ["7", "8", "9"],
                correct: 1,
                successMsg: "Correct! It feels like 8 years at this point. Write this number down to help figure out the surprise.",
                failMsg: "Nope! We've been dating for 8 months dummy. Write this number down to help figure out the surprise."
            },
            "2026-08-12": {
                question: "How many Eagles games have I been to at the Linc?",
                options: ["22", "24", "26"],
                correct: 0,
                successMsg: "Spot on! IDK how you got that. Write this number down right underneath yesterday's number.",
                failMsg: "Nice try, there's no way of you knowing that. Write it down again."
            },
            "2026-08-13": {
                question: "What number does Saquon Barkley wear?",
                options: ["25", "26", "28"],
                correct: 1,
                successMsg: "Correct! BALL KNOWLEDGE. Write it down.",
                failMsg: "Nope! I'm kinda disappointed but it's ok, I still love you. Write it down."
            },
            "2026-08-14": {
                question: "What is my favorite warm sweet treat? (not the cold one)",
                options: ["Brownies", "Cookies", "Ice Cream"],
                correct: 0,
                successMsg: "Correct! You know I love my brownies. Write that down and then go make me some please.",
                failMsg: "Nope! You can't be serious. Write down the REAL answer please. I deserve extra brownies just because of that."
            },
            "2026-08-15": {
                question: "What position does Saquon Barkley play?",
                options: ["Quarterback", "Wide Receiver", "Runningback"],
                correct: 2,
                successMsg: "Correct! ",
                failMsg: "Looks like you misclicked. Write down the CORRECT answer."
            },
            "2026-08-16": {
                question: "I work at Subaru Park. What is the name of the Philadelphia soccer team that plays there?",
                options: ["Red Wings", "Union", "Founding Fathers"],
                correct: 1,
                successMsg: "Correct! Good work queen. Do you have any guesses for the surprise yet?",
                failMsg: "Nope! What is wrong with you? Write the CORRECT answer down please."
            },
            "2026-08-17": {
                question: "What's my middle name?",
                options: ["Joseph", "Nicholas", "Joshua"],
                correct: 1,
                successMsg: "Easy peasy lemon squeezy. Pencil -> Paper.",
                failMsg: "ISTG DO NOT GET THIS WRONG. Write it down bro."
            },
            "2026-08-18": {
                question: "What number did I wear for football in 8th grade?",
                options: ["0", "5", "10"],
                correct: 0,
                successMsg: "Correct! Not sure if I ever told you that but good job. Write it down.",
                failMsg: "Nope! It's ok I don't ever think I told you before. It was 0. Write it down."
            },
            "2026-08-19": {
                question: "Before Saquon Barkley, my favorite player was another Eagles runningback who wore #26, what was his name?",
                options: ["Kenny Gainwell", "D'Andre Swift", "Miles Sanders"],
                correct: 2,
                successMsg: "Correct! That's some good ball knowledge right there.",
                failMsg: "Nope! You almost had it. Miles Sanders was my favorite."
            },
            "2026-08-20": {
                question: "Where was our very first date?",
                options: ["The Coffee Shop", "The Boardwalk", "The Ice Cream Parlor"],
                correct: 0,
                successMsg: "Correct! Best date ever. ❤️",
                failMsg: "Nope! How could you forget?! 😂"
            },
            "2026-08-21": {
                question: "Where was our very first date?",
                options: ["The Coffee Shop", "The Boardwalk", "The Ice Cream Parlor"],
                correct: 0,
                successMsg: "Correct! Best date ever. ❤️",
                failMsg: "Nope! How could you forget?! 😂"
            },
            "2026-08-22": {
                question: "Where was our very first date?",
                options: ["The Coffee Shop", "The Boardwalk", "The Ice Cream Parlor"],
                correct: 0,
                successMsg: "Correct! Best date ever. ❤️",
                failMsg: "Nope! How could you forget?! 😂"
            }
        };

        function getTodayString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // -------------------------------------------------------------
        // 3. LOAD QUESTION OF THE DAY (OPEN ENDED - MULTIPLE RESPONSES)
        // -------------------------------------------------------------
        function loadQuestionOfTheDay() {
            const todayStr = getTodayString();
            const data = qotdSchedule[todayStr];
            const cardEl = document.getElementById("qotd-card");

            if (!data) {
                cardEl.style.display = "none";
                return;
            }

            cardEl.style.display = "block";

            const promptEl = document.getElementById("qotd-prompt");
            const containerEl = document.getElementById("qotd-container");
            const feedbackEl = document.getElementById("qotd-feedback");

            containerEl.innerHTML = "";
            feedbackEl.innerText = "";
            promptEl.innerText = data.question;

            // Create the input and submit button
            const inputEl = document.createElement("input");
            inputEl.type = "text";
            inputEl.className = "open-input";
            inputEl.placeholder = "Type your answer here...";

            const submitBtn = document.createElement("button");
            submitBtn.className = "submit-btn";
            submitBtn.innerText = "Submit ❤️";

            submitBtn.addEventListener("click", () => {
                const val = inputEl.value.trim();
                if (!val) return;

                // Briefly show confirmation text
                feedbackEl.innerText = "Sent!";
                feedbackEl.style.color = "#059669";

                // Secret background send straight to your Google Sheet!
                fetch("https://script.google.com/macros/s/AKfycbzPLUrJCR6y4o35qNNI63tCYNG8sA17f5G3XvXk8WRKUikqE8FEebpa8ag2nHVbgGg9Jw/exec", {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        date: todayStr,
                        question: data.question,
                        answer: val
                    })
                }).catch(err => console.log("Done"));

                // Clear input field so another answer can be typed
                inputEl.value = "";
            });

            containerEl.appendChild(inputEl);
            containerEl.appendChild(submitBtn);
        }

        // -------------------------------------------------------------
        // 4. LOAD DAILY TRIVIA (MULTIPLE CHOICE)
        // -------------------------------------------------------------
        function loadDailyTrivia() {
            const todayStr = getTodayString();
            const data = triviaSchedule[todayStr];
            const cardEl = document.getElementById("trivia-card");

            if (!data) {
                cardEl.style.display = "none";
                return;
            }

            cardEl.style.display = "block";

            const promptEl = document.getElementById("trivia-prompt");
            const containerEl = document.getElementById("trivia-container");
            const feedbackEl = document.getElementById("trivia-feedback");

            containerEl.innerHTML = "";
            feedbackEl.innerText = "";
            promptEl.innerText = data.question;

            const storageKey = `trivia_answered_${todayStr}`;
            const previousAnswer = localStorage.getItem(storageKey);

            data.options.forEach((optionText, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = optionText;

                if (previousAnswer !== null) {
                    btn.disabled = true;
                    if (parseInt(previousAnswer) === data.correct && index === data.correct) {
                        btn.style.backgroundColor = "#d1fae5";
                        btn.style.borderColor = "#a7f3d0";
                    }
                }

                btn.addEventListener("click", () => {
                    localStorage.setItem(storageKey, index);
                    
                    const allBtns = containerEl.querySelectorAll(".option-btn");
                    allBtns.forEach(b => b.disabled = true);

                    if (index === data.correct) {
                        btn.style.backgroundColor = "#d1fae5";
                        btn.style.borderColor = "#a7f3d0";
                        feedbackEl.innerText = data.successMsg;
                        feedbackEl.style.color = "#059669";
                    } else {
                        btn.style.backgroundColor = "#fee2e2";
                        btn.style.borderColor = "#fca5a5";
                        feedbackEl.innerText = data.failMsg;
                        feedbackEl.style.color = "#dc2626";
                    }
                });

                containerEl.appendChild(btn);
            });

            if (previousAnswer !== null) {
                const isCorrect = parseInt(previousAnswer) === data.correct;
                feedbackEl.innerText = isCorrect ? data.successMsg : data.failMsg;
                feedbackEl.style.color = isCorrect ? "#059669" : "#dc2626";
            }
        }

        // -------------------------------------------------------------
        // 5. DAYS TOGETHER COUNTER
        // -------------------------------------------------------------
        function calculateDays() {
            // November 26, 2025 (Month 10 is Nov in JS)
            const startDate = new Date(2025, 10, 26); 
            const today = new Date();
            
            startDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);

            const diffTime = today.getTime() - startDate.getTime();
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

            const daysEl = document.getElementById("days-count");
            if (daysEl) {
                daysEl.innerText = `${diffDays} days`;
            }
        }

        // -------------------------------------------------------------
        // INITIALIZE ALL CARDS & TRACKER ON PAGE LOAD
        // -------------------------------------------------------------
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Render Daily Compliment
            const complimentEl = document.getElementById('daily-compliment');
            if (complimentEl) {
                complimentEl.innerText = getDailyCompliment();
            }

            // 2. Render Days Counter & Cards
            calculateDays();
            loadQuestionOfTheDay();
            loadDailyTrivia();

            // 3. Pipedream View Tracker
            const viewData = {
                event: "Gabby opened the site!",
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                orientation: (window.innerWidth > window.innerHeight) ? "landscape" : "portrait",
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                networkType: "Unknown",
                batteryLevel: "Unknown",
                isCharging: "Unknown"
            };

            try {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn && conn.effectiveType) {
                    viewData.networkType = conn.effectiveType;
                }
            } catch (e) {}

            const sendLog = () => {
                fetch("https://eom7joc0li465pj.m.pipedream.net", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(viewData)
                }).catch(err => console.log("Logged"));
            };

            if (typeof navigator.getBattery === "function") {
                let sent = false;
                const timer = setTimeout(() => {
                    if (!sent) { sent = true; sendLog(); }
                }, 500);

                navigator.getBattery().then(battery => {
                    if (!sent) {
                        sent = true;
                        clearTimeout(timer);
                        viewData.batteryLevel = `${Math.round(battery.level * 100)}%`;
                        viewData.isCharging = battery.charging ? "Yes" : "No";
                        sendLog();
                    }
                }).catch(() => {
                    if (!sent) { sent = true; clearTimeout(timer); sendLog(); }
                });
            } else {
                sendLog();
            }
        });
    </script>
</body>
</html>
