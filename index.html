<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Gabby ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 80%;
        }
        h1 {
            color: #ff4a6b;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.5rem;
            font-weight: 500;
        }
        .heart {
            color: #ff4a6b;
            font-size: 2rem;
            animation: beat .3s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>Danny loves your...</h1>
        <p id="daily-compliment">Loading...</p>
    </div>

    <script>
        // 1. Put your list of compliments here! Add as many as you want.
        const compliments = [
            "Beautiful Blue Eyes",
            "Gorgeous Smile",
            "Contagious Laugh",
            "Kind Heart",
            "Sense of Humor",
            "Amazing Style",
            "Determination",
            "Warm Hugs",
            "Athleticism",
            "Smarts",
            "Kindness",
            "Kisses",
            "Compliments",
            "Ability to Care",
            "Listening Skills",
            "Hilarious Jokes",
            "Work Ethic",
            "Cuddles",
        ];

        // 2. This code automatically picks a new compliment based on the current day
        function getDailyCompliment() {
            const now = new Date();
            // This calculates which day of the year it is (1 to 365)
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            
            // This picks the compliment based on the day. If the day is bigger than your list, 
            // it loops back to the beginning seamlessly.
            // By subtracting 200, today becomes "Day 0" (the very top of your list)
const index = (dayOfYear - 200) % compliments.length;
            return compliments[index];
        }

        // 3. Put it on the screen
        document.getElementById('daily-compliment').innerText = getDailyCompliment();
    </script>
</body>
</html>
